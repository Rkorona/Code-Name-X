<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0D0D0D;
      position: relative;
    }
    #editor {
      width: 100%; height: 100%;
      min-height: 100px;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    /* 离线时的错误提示 */
    #error-msg {
      display: none;
      position: fixed; inset: 0;
      background: #1e1e1e; color: #f48771;
      font-family: monospace; font-size: 14px;
      padding: 32px; line-height: 1.8;
    }
  </style>
</head>
<body>
<div id="editor"></div>
<div id="error-msg"></div>

<!--
  ════════════════════════════════════════════════════════════════
  离线使用方式（推荐）：
    1. 从 https://github.com/microsoft/monaco-editor/releases
       下载 monaco-editor-x.x.x.tgz
    2. 解压后将 package/min/vs/ 整个文件夹
       放入 app/src/main/assets/monaco/vs/
    3. 本页已使用相对路径 'vs'，无需修改任何代码

  开发阶段（需联网）：
    将下面 require.config 中的 'vs' 改为 CDN 路径：
    'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
  ════════════════════════════════════════════════════════════════
-->
<script src="vs/loader.js" onerror="onLoaderError()"></script>
</body>
</html>

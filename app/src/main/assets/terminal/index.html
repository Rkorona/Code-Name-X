<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <link rel="stylesheet" href="./assets/index.css">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1e1e1e;
        }
        #terminal-container {
            position: fixed;
            top: 0; left: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script src="./assets/index.js"></script>
    <script>
    (function () {
        if (typeof a === 'undefined') return;

        var el = document.getElementById('terminal-container');

        // 用 JS 直接设置像素尺寸，完全绕开 CSS 继承歧义
        function applyContainerSize() {
            el.style.width  = window.innerWidth  + 'px';
            el.style.height = window.innerHeight + 'px';
        }
        applyContainerSize();

        // 保存 bundle 里真正的 o.fit()，必须在此处立即保存（覆写之前）
        var _realFit = window.TerminalBridge.resizeTerminal.bind(window.TerminalBridge);

        // ── xterm resize → 通知 Android ────────────────────
        a.onResize(function (size) {
            if (window.AndroidBridge && window.AndroidBridge.onResize) {
                window.AndroidBridge.onResize(size.rows, size.cols);
            }
        });

        // ── PTY 字节 → xterm ────────────────────────────
        window.writeOutput = function (b64) {
            try {
                var s = atob(b64);
                var bytes = new Uint8Array(s.length);
                for (var i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
                a.write(bytes);
            } catch (e) {}
        };

        // ── 字体大小 / 主题 ──────────────────────────────
        window.setFontSize = function (size) {
            a.options.fontSize = size;
            doFit();
        };
        window.setTheme = function (bg, fg) {
            a.options.theme = { background: bg, foreground: fg };
        };

        // ── fit：先更新容器尺寸，再调真正的 o.fit() ─────────
        function doFit() {
            applyContainerSize();
            _realFit();
        }

        // 暴露给 Kotlin 侧
        window.TerminalBridge.resizeTerminal = doFit;

        // 立即执行一次（bundle 的 o.fit() 在 open 时可能尺寸还是 0）
        doFit();

        // 保险：多个时间点重试
        [50, 150, 350, 700].forEach(function(ms) {
            setTimeout(doFit, ms);
        });

        // ResizeObserver：容器真正获得尺寸时触发
        if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(doFit).observe(el);
        }

        // window resize（键盘弹出/收起）
        window.addEventListener('resize', function () {
            applyContainerSize();
            doFit();
        });

    })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <link rel="stylesheet" href="file:///android_asset/terminal/xterm.css">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #111625;
      overflow: hidden;
    }
    #terminal {
      width: 100%;
      height: 100%;
    }
    /* xterm viewport uses 100% height */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="file:///android_asset/terminal/xterm.js"></script>
  <script src="file:///android_asset/terminal/xterm-addon-fit.js"></script>
  <script>
    var term = new Terminal({
      theme: {
        background:    '#111625',
        foreground:    '#e2e8f0',
        cursor:        '#ffffff',
        cursorAccent:  '#111625',
        selectionBackground: 'rgba(56,189,248,0.3)',
        black:         '#1e2130',
        red:           '#ef4444',
        green:         '#22c55e',
        yellow:        '#fbbf24',
        blue:          '#38bdf8',
        magenta:       '#bb86fc',
        cyan:          '#06b6d4',
        white:         '#e2e8f0',
        brightBlack:   '#555a70',
        brightRed:     '#f87171',
        brightGreen:   '#4ade80',
        brightYellow:  '#fcd34d',
        brightBlue:    '#60a5fa',
        brightMagenta: '#d8b4fe',
        brightCyan:    '#22d3ee',
        brightWhite:   '#ffffff',
      },
      fontFamily: "'Courier New', Courier, monospace",
      fontSize: 13,
      lineHeight: 1.25,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      allowTransparency: false,
      convertEol: false,
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    function doFit() {
      try { fitAddon.fit(); } catch(e) {}
    }
    doFit();
    setTimeout(doFit, 100);

    // Resize observer for accurate fit
    var ro = new ResizeObserver(function() { doFit(); });
    ro.observe(document.getElementById('terminal'));

    // ── User input → Kotlin ──────────────────────────────────────
    term.onData(function(data) {
      try {
        // Encode UTF-8 string to base64 safely
        var bytes = new TextEncoder().encode(data);
        var binary = '';
        bytes.forEach(function(b) { binary += String.fromCharCode(b); });
        Android.sendInput(btoa(binary));
      } catch(e) {}
    });

    // ── Terminal resize → Kotlin ─────────────────────────────────
    term.onResize(function(size) {
      try { Android.onResize(size.rows, size.cols); } catch(e) {}
    });

    // ── Kotlin → terminal (PTY output) ──────────────────────────
    function bytesToString(bytes) {
      var result = '';
      for (var i = 0; i < bytes.length; i++) {
        result += String.fromCharCode(bytes[i]);
      }
      return result;
    }

    window.writeOutput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        term.write(bytesToString(bytes));
      } catch(e) {
        console.error('writeOutput error', e);
      }
    };

    // ── Inject raw bytes (toolbar special keys) ──────────────────
    window.injectInput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        var text = bytesToString(bytes);
        term.write(text);          // echo locally
        Android.sendInput(base64); // also send to PTY
      } catch(e) {
        console.error('injectInput error', e);
      }
    };

    // ── Apply settings ───────────────────────────────────────────
    window.setFontSize = function(size) {
      term.options.fontSize = size;
      doFit();
    };

    window.setTheme = function(bg, fg) {
      term.options.theme = Object.assign({}, term.options.theme, {
        background: bg, foreground: fg
      });
    };

    window.clearTerminal = function() { term.clear(); };

    // Focus so keyboard comes up on tap
    term.focus();
  </script>
</body>
</html>

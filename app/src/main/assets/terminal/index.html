<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <base href="https://appassets.androidplatform.net/assets/terminal/">
  <link rel="stylesheet" href="xterm.css">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #111625;
      overflow: hidden;
    }
    #terminal {
      width: 100%;
      height: 100%;
    }
    /* xterm viewport uses 100% height */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="xterm.js"></script>
  <script>
    console.log('terminal index loaded');
    window.onerror = function(message, source, lineno, colno, error) {
      console.error('Terminal error:', message, 'at', source + ':' + lineno + ':' + colno, error);
      var err = document.createElement('pre');
      err.style.color = '#f87171';
      err.style.padding = '16px';
      err.style.whiteSpace = 'pre-wrap';
      err.textContent = 'Terminal JavaScript error:\n' + message + '\n' + source + ':' + lineno + ':' + colno;
      document.body.innerHTML = '';
      document.body.appendChild(err);
      return false;
    };

    var term = new Terminal({
      theme: {
        background:    '#111625',
        foreground:    '#e2e8f0',
        cursor:        '#ffffff',
        cursorAccent:  '#111625',
        selectionBackground: 'rgba(56,189,248,0.3)',
        black:         '#1e2130',
        red:           '#ef4444',
        green:         '#22c55e',
        yellow:        '#fbbf24',
        blue:          '#38bdf8',
        magenta:       '#bb86fc',
        cyan:          '#06b6d4',
        white:         '#e2e8f0',
        brightBlack:   '#555a70',
        brightRed:     '#f87171',
        brightGreen:   '#4ade80',
        brightYellow:  '#fcd34d',
        brightBlue:    '#60a5fa',
        brightMagenta: '#d8b4fe',
        brightCyan:    '#22d3ee',
        brightWhite:   '#ffffff',
      },
      fontFamily: "'Courier New', Courier, monospace",
      fontSize: 13,
      lineHeight: 1.25,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      allowTransparency: false,
      convertEol: false,
    });

    term.open(document.getElementById('terminal'));
    console.log('xterm open called');

    // ── User input → Kotlin ──────────────────────────────────────
    term.onData(function(data) {
      try {
        // Encode UTF-8 string to base64 safely
        var bytes = new TextEncoder().encode(data);
        var binary = '';
        bytes.forEach(function(b) { binary += String.fromCharCode(b); });
        Android.sendInput(btoa(binary));
      } catch(e) {}
    });

    // ── Terminal resize → Kotlin ─────────────────────────────────
    term.onResize(function(size) {
      try { Android.onResize(size.rows, size.cols); } catch(e) {}
    });

    // ── Kotlin → terminal (PTY output) ──────────────────────────
    var __utf8decoder = new TextDecoder();

    window.writeOutput = function(base64) {
      try {
        console.log('writeOutput received, len=' + base64.length);
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        try {
          var preview = '';
          for (var i = 0; i < Math.min(12, bytes.length); i++) {
            preview += ('0' + (bytes[i] & 0xFF).toString(16)).slice(-2) + ' ';
          }
          console.log('writeOutput preview hex:', preview);
        } catch(_e) {}
        try {
          term.write(__utf8decoder.decode(bytes));
        } catch (e) {
          // fallback to naive conversion
          var s = '';
          for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
          term.write(s);
        }
      } catch(e) {
        console.error('writeOutput error', e);
      }
    };

    // ── Inject raw bytes (toolbar special keys) ──────────────────
    window.injectInput = function(base64) {
      try {
        console.log('injectInput called, len=' + base64.length);
        var binary = atob(base64);
        try {
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          term.write(__utf8decoder.decode(bytes));
        } catch (e) {
          term.write(binary);
        }
        Android.sendInput(base64); // also send to PTY
      } catch(e) {
        console.error('injectInput error', e);
      }
    };

    // ── Apply settings ───────────────────────────────────────────
    window.setFontSize = function(size) {
      term.options.fontSize = size;
      doFit();
    };

    window.setTheme = function(bg, fg) {
      term.options.theme = Object.assign({}, term.options.theme, {
        background: bg, foreground: fg
      });
    };

    window.clearTerminal = function() { term.clear(); };

    // Focus so keyboard comes up on tap
    term.focus();
  </script>
</body>
</html>

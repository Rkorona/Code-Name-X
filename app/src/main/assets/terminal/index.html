<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <base href="https://appassets.androidplatform.net/assets/terminal/">
  <link rel="stylesheet" href="xterm.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #111625;
      overflow: hidden;
    }
    #terminal {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: #111625;
      overflow: hidden;
    }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script>
    // Prefer clientWidth/clientHeight (layout viewport, always correct in WebView)
    // window.innerWidth may return 980 (desktop default) if viewport meta not applied yet
    console.log('terminal init: innerW=' + window.innerWidth + ' innerH=' + window.innerHeight
      + ' clientW=' + document.documentElement.clientWidth
      + ' clientH=' + document.documentElement.clientHeight);

    window.onerror = function(msg, src, line) {
      var el = document.createElement('pre');
      el.style.cssText = 'color:#f87171;padding:16px;white-space:pre-wrap;font-size:13px;';
      el.textContent = 'Error: ' + msg + '\n' + src + ':' + line;
      document.body.innerHTML = '';
      document.body.appendChild(el);
      return false;
    };

    // ── Measure actual font cell size using a hidden probe ────────
    // This avoids depending on xterm rendering before we know cell dims.
    function measureCell(fontSize, fontFamily, lineHeight) {
      var span = document.createElement('span');
      span.style.cssText =
        'position:fixed;top:-9999px;left:0;visibility:hidden;white-space:pre;' +
        'font-family:' + fontFamily + ';' +
        'font-size:' + fontSize + 'px;' +
        'line-height:' + lineHeight + ';';
      // Use many chars to average out sub-pixel rounding
      span.textContent = 'MMMMMMMMMMMMMMMMMMMM';
      document.body.appendChild(span);
      var rect = span.getBoundingClientRect();
      document.body.removeChild(span);
      var cellW = rect.width / 20;
      var cellH = rect.height;
      console.log('measureCell: cellW=' + cellW.toFixed(2) + ' cellH=' + cellH.toFixed(2));
      return { w: cellW, h: cellH };
    }

    var FONT_SIZE   = 13;
    var FONT_FAMILY = "'Courier New', Courier, monospace";
    var LINE_HEIGHT = 1.25;

    var cell = measureCell(FONT_SIZE, FONT_FAMILY, LINE_HEIGHT);

    // Ensure we have reasonable fallbacks
    var cellW = (cell.w > 0) ? cell.w : 7.8;
    var cellH = (cell.h > 0) ? cell.h : 16.25;

    // Use Kotlin-provided dimensions if available (set by onPageFinished / OnGlobalLayoutListener)
    // Fall back to JS measurement only if Kotlin hasn't called yet
    var _kotlinCssW = 0, _kotlinCssH = 0;

    var iw = _kotlinCssW || document.documentElement.clientWidth  || window.innerWidth  || 360;
    var ih = _kotlinCssH || document.documentElement.clientHeight || window.innerHeight || 640;

    var initCols = Math.max(2,  Math.floor(iw / cellW));
    var initRows = Math.max(1,  Math.floor(ih / cellH));

    console.log('initial size: cols=' + initCols + ' rows=' + initRows
      + ' iw=' + iw + ' ih=' + ih);

    // ── Create terminal with correct initial dimensions ───────────
    var term = new Terminal({
      cols: initCols,
      rows: initRows,
      theme: {
        background:    '#111625',
        foreground:    '#e2e8f0',
        cursor:        '#ffffff',
        cursorAccent:  '#111625',
        selectionBackground: 'rgba(56,189,248,0.3)',
        black:   '#1e2130', red:    '#ef4444', green:  '#22c55e',
        yellow:  '#fbbf24', blue:   '#38bdf8', magenta:'#bb86fc',
        cyan:    '#06b6d4', white:  '#e2e8f0',
        brightBlack:   '#555a70', brightRed:    '#f87171',
        brightGreen:   '#4ade80', brightYellow: '#fcd34d',
        brightBlue:    '#60a5fa', brightMagenta:'#d8b4fe',
        brightCyan:    '#22d3ee', brightWhite:  '#ffffff',
      },
      fontFamily: FONT_FAMILY,
      fontSize:   FONT_SIZE,
      lineHeight: LINE_HEIGHT,
      cursorBlink:  true,
      cursorStyle:  'block',
      scrollback:   5000,
      allowTransparency: false,
      convertEol:   false,
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    console.log('xterm opened: rows=' + term.rows + ' cols=' + term.cols);

    // ── Reliable scroll-to-bottom: fires now + after xterm async render ──
    function scheduleScrollToBottom() {
      term.scrollToBottom();
      clearTimeout(window._scrollTimer1);
      clearTimeout(window._scrollTimer2);
      clearTimeout(window._scrollTimer3);
      clearTimeout(window._scrollTimer4);
      window._scrollTimer1 = setTimeout(function() { term.scrollToBottom(); }, 80);
      window._scrollTimer2 = setTimeout(function() { term.scrollToBottom(); }, 250);
      window._scrollTimer3 = setTimeout(function() { term.scrollToBottom(); }, 450);
      window._scrollTimer4 = setTimeout(function() { term.scrollToBottom(); }, 700);
    }

    // Exposed for Kotlin to call after setViewportSize
    window.scrollTerm = function() { scheduleScrollToBottom(); };

    // ── setViewportSize: called by Kotlin with exact WebView CSS px ──
    // This is the authoritative source for dimensions — bypasses all
    // unreliable JS viewport APIs (window.innerWidth, clientWidth, etc.)
    window.setViewportSize = function(w, h) {
      var iw2 = Math.floor(w);
      var ih2 = Math.floor(h);
      if (iw2 <= 0 || ih2 <= 0) return;

      // Skip no-op calls. During the IME show/hide slide animation, Android's
      // OnGlobalLayoutListener can fire 50+ times in ~250ms, often repeating the
      // same (stale) size before the real one comes through. Re-running fit()
      // for identical dimensions is pure churn and was adding noise that made
      // the real resize harder to reason about.
      if (iw2 === _kotlinCssW && ih2 === _kotlinCssH) return;

      _kotlinCssW = iw2;
      _kotlinCssH = ih2;
      console.log('setViewportSize: w=' + iw2 + ' h=' + ih2);

      // Force the terminal div to exactly match the known visible area.
      // position:fixed / bottom:0 in WebView anchors to the layout viewport,
      // not the visual viewport, so the prompt ends up behind the keyboard.
      // Explicit pixel dimensions guarantee xterm.js sees the real visible size.
      var termEl = document.getElementById('terminal');
      termEl.style.width  = iw2 + 'px';
      termEl.style.height = ih2 + 'px';

      // Use FitAddon's own measurement instead of the hand-rolled offscreen-span
      // probe. measureCell() estimates ~14.6px/row via CSS line-height on a <span>,
      // but xterm's real renderer comes out closer to fontSize*lineHeight (~16.25px).
      // That ~10% gap is invisible when there's slack space, but at a tight
      // keyboard-up height it overshoots the row count by 1-2 rows, and the bottom
      // row (the newest output / prompt) gets clipped by #terminal's overflow:hidden
      // — no amount of scrollToBottom() can fix a row that doesn't physically fit.
      fitAddon.fit();
      console.log('setViewportSize → cols=' + term.cols + ' rows=' + term.rows);
      try { Android.onResize(term.rows, term.cols); } catch(e) {}
      scheduleScrollToBottom();
    };

    // ── Resize helper (for window resize / keyboard in-out) ───────
    function doFit() {
      // Always prefer Kotlin-provided dimensions; they reflect the true WebView size
      // after Compose imePadding shrinks it. JS viewport APIs are unreliable in WebView.
      var iw2 = _kotlinCssW || document.documentElement.clientWidth  || window.innerWidth  || 360;
      var ih2 = _kotlinCssH || document.documentElement.clientHeight || window.innerHeight || 640;

      // Keep the terminal div in sync with the known visible area
      var termEl = document.getElementById('terminal');
      termEl.style.width  = iw2 + 'px';
      termEl.style.height = ih2 + 'px';

      fitAddon.fit();
      console.log('doFit: rows=' + term.rows + ' cols=' + term.cols + ' ih=' + ih2);
      try { Android.onResize(term.rows, term.cols); } catch(e) {}
      scheduleScrollToBottom();
    }

    // One deferred fit after layout settles, to catch any diff from initial measure
    setTimeout(doFit, 250);

    window.addEventListener('resize', function() {
      clearTimeout(window._fitTimer);
      window._fitTimer = setTimeout(doFit, 80);
    });

    // visualViewport fires when the keyboard fully settles — more reliable than 'resize'
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        clearTimeout(window._vpTimer);
        window._vpTimer = setTimeout(function() {
          scheduleScrollToBottom();
        }, 100);
      });
    }

    if (window.ResizeObserver) {
      var ro = new ResizeObserver(function() {
        clearTimeout(window._fitTimer);
        window._fitTimer = setTimeout(doFit, 80);
      });
      ro.observe(document.getElementById('terminal'));
    }

    // ── Ctrl 工具栏状态（由 Kotlin 同步） ──────────────────────────
    // 软键盘输入完全走 term.onData，不会经过工具栏的按键处理函数，
    // 所以 Ctrl 开关必须在这里也生效一份，否则只能跟工具栏上的符号键组合
    // （工具栏里根本没有 a-z 字母键，等于 Ctrl 永远用不上）。
    var ctrlArmed = false;
    window.setCtrlArmed = function(v) { ctrlArmed = !!v; };

    // ── User input → Kotlin ──────────────────────────────────────
    term.onData(function(data) {
      try {
        var toSend = data;
        if (ctrlArmed && data.length === 1) {
          var code = data.charCodeAt(0);
          // Ctrl+<letter/symbol>: standard terminals map this by masking off
          // the top bits — works for A-Z, a-z, @ [ \ ] ^ _ etc.
          if (code >= 0x3F && code <= 0x7E) {
            toSend = String.fromCharCode(code & 0x1F);
          }
          ctrlArmed = false;
          try { Android.ctrlConsumed(); } catch(e) {}
        }
        var bytes = new TextEncoder().encode(toSend);
        var binary = '';
        bytes.forEach(function(b) { binary += String.fromCharCode(b); });
        Android.sendInput(btoa(binary));
      } catch(e) {}
    });

    // ── Terminal resize → Kotlin ─────────────────────────────────
    term.onResize(function(size) {
      try { Android.onResize(size.rows, size.cols); } catch(e) {}
    });

    // ── PTY output → terminal ────────────────────────────────────
    var __utf8dec = new TextDecoder();

    window.writeOutput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        try { term.write(__utf8dec.decode(bytes), function() { term.scrollToBottom(); }); }
        catch(e) {
          var s = '';
          for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
          term.write(s, function() { term.scrollToBottom(); });
        }
      } catch(e) { console.error('writeOutput error', e); }
    };

    // ── Toolbar keys ─────────────────────────────────────────────
    window.injectInput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        try { term.write(__utf8dec.decode(bytes)); } catch(e) { term.write(binary); }
        Android.sendInput(base64);
      } catch(e) { console.error('injectInput error', e); }
    };

    // ── Settings ────────────────────────────────────────────────
    window.setFontSize = function(size) {
      term.options.fontSize = size;
      doFit();
    };
    window.setTheme = function(bg, fg) {
      term.options.theme = Object.assign({}, term.options.theme, { background: bg, foreground: fg });
    };
    window.clearTerminal = function() { term.clear(); };

    term.focus();
  </script>
</body>
</html>

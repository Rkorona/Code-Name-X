<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <base href="https://appassets.androidplatform.net/assets/terminal/">
  <link rel="stylesheet" href="xterm.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111625;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111625;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1 1 auto;
      width: 100vw;
      min-height: 0;
      overflow: hidden;
    }
    /* xterm internal sizing */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
    .xterm-screen { height: 100% !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script>
    console.log('terminal index loaded');
    window.onerror = function(message, source, lineno, colno, error) {
      console.error('Terminal error:', message, 'at', source + ':' + lineno + ':' + colno, error);
      var err = document.createElement('pre');
      err.style.cssText = 'color:#f87171;padding:16px;white-space:pre-wrap;font-family:monospace;font-size:13px;';
      err.textContent = 'Terminal JS error:\n' + message + '\n' + source + ':' + lineno + ':' + colno;
      document.body.innerHTML = '';
      document.body.appendChild(err);
      return false;
    };

    var fitAddon = new FitAddon.FitAddon();

    var term = new Terminal({
      theme: {
        background:    '#111625',
        foreground:    '#e2e8f0',
        cursor:        '#ffffff',
        cursorAccent:  '#111625',
        selectionBackground: 'rgba(56,189,248,0.3)',
        black:         '#1e2130',
        red:           '#ef4444',
        green:         '#22c55e',
        yellow:        '#fbbf24',
        blue:          '#38bdf8',
        magenta:       '#bb86fc',
        cyan:          '#06b6d4',
        white:         '#e2e8f0',
        brightBlack:   '#555a70',
        brightRed:     '#f87171',
        brightGreen:   '#4ade80',
        brightYellow:  '#fcd34d',
        brightBlue:    '#60a5fa',
        brightMagenta: '#d8b4fe',
        brightCyan:    '#22d3ee',
        brightWhite:   '#ffffff',
      },
      fontFamily: "'Courier New', Courier, monospace",
      fontSize: 13,
      lineHeight: 1.25,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      allowTransparency: false,
      convertEol: false,
    });

    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    console.log('xterm open called');

    // Force #terminal to fill the actual viewport height
    function applyExplicitHeight() {
      var h = window.innerHeight;
      var el = document.getElementById('terminal');
      if (el && h > 0) {
        el.style.height = h + 'px';
      }
    }

    function doFit() {
      applyExplicitHeight();
      try {
        fitAddon.fit();
        var r = term.rows, c = term.cols;
        console.log('doFit: rows=' + r + ' cols=' + c + ' innerH=' + window.innerHeight);
        if (r <= 1 && window.innerHeight > 50) {
          // rows=1 means height not ready yet, retry
          console.log('doFit: rows still 1, scheduling retry');
          setTimeout(doFit, 200);
          return;
        }
        try { Android.onResize(r, c); } catch(e) {}
      } catch(e) {
        console.error('doFit error', e);
      }
    }

    // Staggered fits to catch layout settling at different times
    setTimeout(doFit, 50);
    setTimeout(doFit, 200);
    setTimeout(doFit, 600);
    setTimeout(doFit, 1200);

    window.addEventListener('resize', doFit);

    if (window.ResizeObserver) {
      var ro = new ResizeObserver(function() { doFit(); });
      ro.observe(document.getElementById('terminal'));
    }

    // ── User input → Kotlin ──────────────────────────────────────
    term.onData(function(data) {
      try {
        var bytes = new TextEncoder().encode(data);
        var binary = '';
        bytes.forEach(function(b) { binary += String.fromCharCode(b); });
        Android.sendInput(btoa(binary));
      } catch(e) {}
    });

    // ── Terminal resize → Kotlin ─────────────────────────────────
    term.onResize(function(size) {
      try { Android.onResize(size.rows, size.cols); } catch(e) {}
    });

    // ── Kotlin → terminal (PTY output) ──────────────────────────
    var __utf8decoder = new TextDecoder();

    window.writeOutput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        try {
          term.write(__utf8decoder.decode(bytes));
        } catch (e) {
          var s = '';
          for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
          term.write(s);
        }
      } catch(e) {
        console.error('writeOutput error', e);
      }
    };

    // ── Inject raw bytes (toolbar special keys) ──────────────────
    window.injectInput = function(base64) {
      try {
        var binary = atob(base64);
        try {
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          term.write(__utf8decoder.decode(bytes));
        } catch (e) {
          term.write(binary);
        }
        Android.sendInput(base64);
      } catch(e) {
        console.error('injectInput error', e);
      }
    };

    // ── Apply settings ───────────────────────────────────────────
    window.setFontSize = function(size) {
      term.options.fontSize = size;
      doFit();
    };

    window.setTheme = function(bg, fg) {
      term.options.theme = Object.assign({}, term.options.theme, {
        background: bg, foreground: fg
      });
    };

    window.clearTerminal = function() { term.clear(); };

    term.focus();
  </script>
</body>
</html>

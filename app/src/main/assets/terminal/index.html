<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <link rel="stylesheet" href="./assets/index.css">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            overflow: hidden;
        }
        #terminal-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script src="./assets/index.js"></script>
    <script>
    (function () {
        if (typeof a === 'undefined') return;

        // 保存 bundle 设置的原始 o.fit() 引用，必须在覆写前保存
        var _doRealFit = window.TerminalBridge.resizeTerminal.bind(window.TerminalBridge);

        // ── xterm resize 事件 → 通知 Android ──────────────
        a.onResize(function (size) {
            if (window.AndroidBridge && window.AndroidBridge.onResize) {
                window.AndroidBridge.onResize(size.rows, size.cols);
            }
        });

        // ── PTY 字节 → xterm ────────────────────────────
        window.writeOutput = function (b64) {
            try {
                var s = atob(b64);
                var bytes = new Uint8Array(s.length);
                for (var i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
                a.write(bytes);
            } catch (e) {}
        };

        // ── 字体大小 / 主题 API ──────────────────────────
        window.setFontSize = function (size) {
            a.options.fontSize = size;
            scheduleFit();
        };

        window.setTheme = function (bg, fg) {
            a.options.theme = { background: bg, foreground: fg };
        };

        // ── 带重试的 fit 调度器 ─────────────────────────
        // _doRealFit() 调用原始 o.fit()，scheduleFit 只是触发时机控制器
        var fitScheduled = false;
        var fitAttempts  = 0;

        function doFit() {
            fitScheduled = false;
            var el = document.getElementById('terminal-container');
            if (!el) return;
            var rect = el.getBoundingClientRect();
            if (rect.height <= 0 || rect.width <= 0) {
                // 容器还没尺寸，稍后重试
                if (fitAttempts < 30) {
                    fitAttempts++;
                    setTimeout(scheduleFit, 100);
                }
                return;
            }
            fitAttempts = 0;
            _doRealFit(); // 调用真正的 o.fit()
        }

        function scheduleFit() {
            if (fitScheduled) return;
            fitScheduled = true;
            requestAnimationFrame(doFit);
        }

        // 覆写 TerminalBridge.resizeTerminal，让 Kotlin 侧调用也走重试逻辑
        window.TerminalBridge.resizeTerminal = scheduleFit;

        // 初始 fit（多个时间点保险触发）
        scheduleFit();
        setTimeout(scheduleFit, 100);
        setTimeout(scheduleFit, 400);
        setTimeout(scheduleFit, 800);

        // window resize 时重新 fit
        window.addEventListener('resize', scheduleFit);

    })();
    </script>
</body>
</html>

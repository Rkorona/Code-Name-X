<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <base href="https://appassets.androidplatform.net/assets/terminal/">
  <link rel="stylesheet" href="xterm.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #111625;
      overflow: hidden;
    }
    #terminal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #111625;
      overflow: hidden;
    }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script>
    console.log('terminal index loaded, innerW=' + window.innerWidth + ' innerH=' + window.innerHeight);

    window.onerror = function(msg, src, line, col, err) {
      console.error('JS error:', msg, src + ':' + line);
      var el = document.createElement('pre');
      el.style.cssText = 'color:#f87171;padding:16px;white-space:pre-wrap;font-size:13px;';
      el.textContent = 'Error: ' + msg + '\n' + src + ':' + line;
      document.body.innerHTML = '';
      document.body.appendChild(el);
      return false;
    };

    var fitAddon = new FitAddon.FitAddon();

    var term = new Terminal({
      theme: {
        background:    '#111625',
        foreground:    '#e2e8f0',
        cursor:        '#ffffff',
        cursorAccent:  '#111625',
        selectionBackground: 'rgba(56,189,248,0.3)',
        black:   '#1e2130', red:    '#ef4444', green:  '#22c55e',
        yellow:  '#fbbf24', blue:   '#38bdf8', magenta:'#bb86fc',
        cyan:    '#06b6d4', white:  '#e2e8f0',
        brightBlack:   '#555a70', brightRed:    '#f87171',
        brightGreen:   '#4ade80', brightYellow: '#fcd34d',
        brightBlue:    '#60a5fa', brightMagenta:'#d8b4fe',
        brightCyan:    '#22d3ee', brightWhite:  '#ffffff',
      },
      fontFamily: "'Courier New', Courier, monospace",
      fontSize: 13,
      lineHeight: 1.25,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      allowTransparency: false,
      convertEol: false,
    });

    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    console.log('xterm open done');

    // ── Sizing ─────────────────────────────────────────────────────
    // Primary: use xterm internal cell metrics + window dimensions
    // Fallback: FitAddon (works once #terminal is position:fixed)
    var _fitScheduled = false;

    function doFit() {
      _fitScheduled = false;
      try {
        // Try direct cell-metric approach first
        var core = term._core;
        var cellH = 0, cellW = 0;
        try {
          var dims = core._renderService.dimensions;
          // css property available since xterm 5; pixel fallback for xterm 4
          if (dims.css && dims.css.cell) {
            cellH = dims.css.cell.height;
            cellW = dims.css.cell.width;
          } else if (dims.actualCellHeight) {
            cellH = dims.actualCellHeight;
            cellW = dims.actualCellWidth;
          }
        } catch(e) {}

        var iw = window.innerWidth;
        var ih = window.innerHeight;

        if (cellH > 0 && cellW > 0 && ih > 0 && iw > 0) {
          var rows = Math.max(1, Math.floor(ih / cellH));
          var cols = Math.max(2, Math.floor(iw / cellW));
          console.log('manualFit: cellH=' + cellH.toFixed(2) + ' cellW=' + cellW.toFixed(2)
            + ' ih=' + ih + ' iw=' + iw + ' rows=' + rows + ' cols=' + cols);
          if (term.rows !== rows || term.cols !== cols) {
            term.resize(cols, rows);
          }
          try { Android.onResize(term.rows, term.cols); } catch(e) {}
          return;
        }

        // Fallback: FitAddon (relies on #terminal being position:fixed)
        fitAddon.fit();
        console.log('fitAddon fallback: rows=' + term.rows + ' cols=' + term.cols);
        if (term.rows <= 2 && ih > 100) {
          scheduleFit(300);
        } else {
          try { Android.onResize(term.rows, term.cols); } catch(e) {}
        }
      } catch(e) {
        console.error('doFit error', e);
      }
    }

    function scheduleFit(delay) {
      if (_fitScheduled) return;
      _fitScheduled = true;
      setTimeout(function() { doFit(); }, delay || 0);
    }

    // Wait for xterm to paint before first fit (cell metrics need 1 rAF)
    requestAnimationFrame(function() {
      doFit();
      // Extra passes to catch late layout changes
      setTimeout(doFit, 300);
      setTimeout(doFit, 800);
    });

    window.addEventListener('resize', function() { scheduleFit(50); });

    if (window.ResizeObserver) {
      var ro = new ResizeObserver(function() { scheduleFit(50); });
      ro.observe(document.getElementById('terminal'));
    }

    // ── User input → Kotlin ──────────────────────────────────────
    term.onData(function(data) {
      try {
        var bytes = new TextEncoder().encode(data);
        var binary = '';
        bytes.forEach(function(b) { binary += String.fromCharCode(b); });
        Android.sendInput(btoa(binary));
      } catch(e) {}
    });

    // ── Terminal resize → Kotlin ─────────────────────────────────
    term.onResize(function(size) {
      try { Android.onResize(size.rows, size.cols); } catch(e) {}
    });

    // ── PTY output → terminal ────────────────────────────────────
    var __utf8dec = new TextDecoder();

    window.writeOutput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        try { term.write(__utf8dec.decode(bytes)); }
        catch(e) {
          var s = '';
          for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
          term.write(s);
        }
      } catch(e) { console.error('writeOutput error', e); }
    };

    // ── Toolbar special keys ────────────────────────────────────
    window.injectInput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        try { term.write(__utf8dec.decode(bytes)); } catch(e) { term.write(binary); }
        Android.sendInput(base64);
      } catch(e) { console.error('injectInput error', e); }
    };

    // ── Settings ────────────────────────────────────────────────
    window.setFontSize = function(size) { term.options.fontSize = size; doFit(); };
    window.setTheme = function(bg, fg) {
      term.options.theme = Object.assign({}, term.options.theme, { background: bg, foreground: fg });
    };
    window.clearTerminal = function() { term.clear(); };

    term.focus();
  </script>
</body>
</html>

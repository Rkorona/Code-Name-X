<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <base href="https://appassets.androidplatform.net/assets/terminal/">
  <link rel="stylesheet" href="xterm.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #111625;
      overflow: hidden;
    }
    #terminal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #111625;
      overflow: hidden;
    }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script>
    // Prefer clientWidth/clientHeight (layout viewport, always correct in WebView)
    // window.innerWidth may return 980 (desktop default) if viewport meta not applied yet
    console.log('terminal init: innerW=' + window.innerWidth + ' innerH=' + window.innerHeight
      + ' clientW=' + document.documentElement.clientWidth
      + ' clientH=' + document.documentElement.clientHeight);

    window.onerror = function(msg, src, line) {
      var el = document.createElement('pre');
      el.style.cssText = 'color:#f87171;padding:16px;white-space:pre-wrap;font-size:13px;';
      el.textContent = 'Error: ' + msg + '\n' + src + ':' + line;
      document.body.innerHTML = '';
      document.body.appendChild(el);
      return false;
    };

    // ── Measure actual font cell size using a hidden probe ────────
    // This avoids depending on xterm rendering before we know cell dims.
    function measureCell(fontSize, fontFamily, lineHeight) {
      var span = document.createElement('span');
      span.style.cssText =
        'position:fixed;top:-9999px;left:0;visibility:hidden;white-space:pre;' +
        'font-family:' + fontFamily + ';' +
        'font-size:' + fontSize + 'px;' +
        'line-height:' + lineHeight + ';';
      // Use many chars to average out sub-pixel rounding
      span.textContent = 'MMMMMMMMMMMMMMMMMMMM';
      document.body.appendChild(span);
      var rect = span.getBoundingClientRect();
      document.body.removeChild(span);
      var cellW = rect.width / 20;
      var cellH = rect.height;
      console.log('measureCell: cellW=' + cellW.toFixed(2) + ' cellH=' + cellH.toFixed(2));
      return { w: cellW, h: cellH };
    }

    var FONT_SIZE   = 13;
    var FONT_FAMILY = "'Courier New', Courier, monospace";
    var LINE_HEIGHT = 1.25;

    var cell = measureCell(FONT_SIZE, FONT_FAMILY, LINE_HEIGHT);

    // Ensure we have reasonable fallbacks
    var cellW = (cell.w > 0) ? cell.w : 7.8;
    var cellH = (cell.h > 0) ? cell.h : 16.25;

    // clientWidth/clientHeight = layout viewport in CSS px, always correct with useWideViewPort=true
    var iw = document.documentElement.clientWidth  || window.innerWidth  || 360;
    var ih = document.documentElement.clientHeight || window.innerHeight || 640;

    var initCols = Math.max(2,  Math.floor(iw / cellW));
    var initRows = Math.max(1,  Math.floor(ih / cellH));

    console.log('initial size: cols=' + initCols + ' rows=' + initRows
      + ' iw=' + iw + ' ih=' + ih);

    // ── Create terminal with correct initial dimensions ───────────
    var term = new Terminal({
      cols: initCols,
      rows: initRows,
      theme: {
        background:    '#111625',
        foreground:    '#e2e8f0',
        cursor:        '#ffffff',
        cursorAccent:  '#111625',
        selectionBackground: 'rgba(56,189,248,0.3)',
        black:   '#1e2130', red:    '#ef4444', green:  '#22c55e',
        yellow:  '#fbbf24', blue:   '#38bdf8', magenta:'#bb86fc',
        cyan:    '#06b6d4', white:  '#e2e8f0',
        brightBlack:   '#555a70', brightRed:    '#f87171',
        brightGreen:   '#4ade80', brightYellow: '#fcd34d',
        brightBlue:    '#60a5fa', brightMagenta:'#d8b4fe',
        brightCyan:    '#22d3ee', brightWhite:  '#ffffff',
      },
      fontFamily: FONT_FAMILY,
      fontSize:   FONT_SIZE,
      lineHeight: LINE_HEIGHT,
      cursorBlink:  true,
      cursorStyle:  'block',
      scrollback:   5000,
      allowTransparency: false,
      convertEol:   false,
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    console.log('xterm opened: rows=' + term.rows + ' cols=' + term.cols);

    // ── Resize helper (for window resize / keyboard in-out) ───────
    function doFit() {
      var iw2 = document.documentElement.clientWidth  || window.innerWidth  || 360;
      var ih2 = document.documentElement.clientHeight || window.innerHeight || 640;
      var c   = measureCell(term.options.fontSize, term.options.fontFamily, term.options.lineHeight);
      var cw  = (c.w > 0) ? c.w : cellW;
      var ch  = (c.h > 0) ? c.h : cellH;
      var cols2 = Math.max(2, Math.floor(iw2 / cw));
      var rows2 = Math.max(1, Math.floor(ih2 / ch));
      console.log('doFit: rows=' + rows2 + ' cols=' + cols2 + ' ih=' + ih2);
      if (term.rows !== rows2 || term.cols !== cols2) {
        term.resize(cols2, rows2);
      }
      try { Android.onResize(term.rows, term.cols); } catch(e) {}
      term.scrollToBottom();
    }

    // One deferred fit after layout settles, to catch any diff from initial measure
    setTimeout(doFit, 250);

    window.addEventListener('resize', function() {
      clearTimeout(window._fitTimer);
      window._fitTimer = setTimeout(doFit, 80);
    });

    if (window.ResizeObserver) {
      var ro = new ResizeObserver(function() {
        clearTimeout(window._fitTimer);
        window._fitTimer = setTimeout(doFit, 80);
      });
      ro.observe(document.getElementById('terminal'));
    }

    // ── User input → Kotlin ──────────────────────────────────────
    term.onData(function(data) {
      try {
        var bytes = new TextEncoder().encode(data);
        var binary = '';
        bytes.forEach(function(b) { binary += String.fromCharCode(b); });
        Android.sendInput(btoa(binary));
      } catch(e) {}
    });

    // ── Terminal resize → Kotlin ─────────────────────────────────
    term.onResize(function(size) {
      try { Android.onResize(size.rows, size.cols); } catch(e) {}
    });

    // ── PTY output → terminal ────────────────────────────────────
    var __utf8dec = new TextDecoder();

    window.writeOutput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        try { term.write(__utf8dec.decode(bytes)); }
        catch(e) {
          var s = '';
          for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
          term.write(s);
        }
      } catch(e) { console.error('writeOutput error', e); }
    };

    // ── Toolbar keys ─────────────────────────────────────────────
    window.injectInput = function(base64) {
      try {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        try { term.write(__utf8dec.decode(bytes)); } catch(e) { term.write(binary); }
        Android.sendInput(base64);
      } catch(e) { console.error('injectInput error', e); }
    };

    // ── Settings ────────────────────────────────────────────────
    window.setFontSize = function(size) {
      term.options.fontSize = size;
      doFit();
    };
    window.setTheme = function(bg, fg) {
      term.options.theme = Object.assign({}, term.options.theme, { background: bg, foreground: fg });
    };
    window.clearTerminal = function() { term.clear(); };

    term.focus();
  </script>
</body>
</html>
